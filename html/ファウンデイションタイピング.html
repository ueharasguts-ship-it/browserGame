<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Visual Key Typer - Big Edition</title>
    <style>
        body {
            text-align: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding-top: 20px;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- タイトル画面 --- */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2c3e50, #1a1a1a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .title-icon {
            width: 150px;
            /* アイコンを大きく */
            height: auto;
            filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.5));
            animation: icon-float 3s ease-in-out infinite alternate;
        }

        @keyframes icon-float {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-20px);
            }
        }

        #game-title {
            font-size: 70px;
            font-weight: bold;
            color: #ecf0f1;
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.6);
            margin: 0;
        }

        /* --- タイムバー --- */
        #timer-container {
            width: 80%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: #e74c3c;
            transition: width 0.1s linear;
        }

        /* --- ゲームエリア --- */
        #game-area {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #key-image-area {
            height: 340px;
            /* 画像エリア */
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #key-image {
            max-height: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        #word {
            font-size: 64px;
            font-weight: bold;
            min-height: 90px;
            margin: 10px 0;
        }

        /* --- 終了画面 --- */
        #result-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            border: none;
            color: white;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.3s;
        }

        .retry-btn {
            background: #2ecc71;
        }

        .home-btn {
            background: #3498db;
        }

        button:hover {
            transform: scale(1.1);
        }

        .flash-green {
            color: #2ecc71 !important;
            transform: scale(1.1);
        }

        .flash-red {
            color: #e74c3c !important;
            animation: shake 0.2s;
        }

        #result-image {
            width: 500px;
            /* さらに大きく */
            max-height: 350px;
            object-fit: contain;
            margin: 10px 0;
            /* マージンを少し狭く */
            animation: pop-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #final-score {
            font-size: 48px;
            margin: 5px 0 20px 0;
            /* 下の余白を調整 */
            color: #f1c40f;
            font-weight: bold;
        }

        @keyframes pop-in {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-15px);
            }

            75% {
                transform: translateX(15px);
            }
        }
    </style>
</head>

<body>

    <div id="start-screen">
        <div class="title-container">
            <img src="../img/icon-left.png" class="title-icon" alt="icon">
            <div id="game-title">ファウンデイション<br>タイピング</div>
            <img src="../img/icon-right.png" class="title-icon" alt="icon">
        </div>
        <div id="game-desc">
            ランダムで表示される「キー」の画像を見て<br>
            制限時間内に全20問クリアを目指せ！
        </div>
        <div id="start-prompt"
            style="font-size: 32px; color: #2ecc71; font-weight: bold; animation: blink 1.5s infinite;">👇[ Space ] 👇
        </div>
    </div>

    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div id="game-area">
        <div id="counter">第 1 / 20 問</div>
        <div id="key-image-area">
            <img id="key-image" src="" alt="">
        </div>
        <div id="word"></div>
        <div id="score">SCORE: 0</div>
    </div>

    <div id="result-screen">
        <h1 id="result-status">GAME CLEAR!</h1>
        <img id="result-image" src="" alt="result">

        <p id="final-time" style="font-size: 28px; color: #3498db; margin: 0;"></p>
        <p id="final-score" style="font-size: 48px;"></p>

        <div class="btn-group">
            <button class="retry-btn" onclick="resetGame(true)">もう一度遊ぶ</button>
            <button class="home-btn" onclick="resetGame(false)">タイトルへ戻る</button>
        </div>
    </div>

    <script>
        const keyList = [
            { display: 'Shift（シフト）', key: 'Shift', img: '../img/shift.png' },
            { display: 'Alt（オルト）', key: 'Alt', img: '../img/alt.png' },
            { display: 'Ctrl(コントロール)', key: 'Control', img: '../img/ctrl.png' },
            { display: 'Enter（エンター）', key: 'Enter', img: '../img/enter.png' },
            { display: 'Backspace（バックスペース）', key: 'Backspace', img: '../img/backspace.png' },
            { display: 'Space（スペース）', key: ' ', img: '../img/space.png' },
            { display: 'Tab（タブ）', key: 'Tab', img: '../img/tab.png' },
            { display: 'Esc（エスケープ）', key: 'Escape', img: '../img/esc.png' },
            { display: 'Delete（デリート）', key: 'Delete', img: '../img/delete.png' }
        ];

        let score = 0;
        let questionCount = 0;
        const TOTAL_QUESTIONS = 20;
        const LIMIT_TIME = 60;
        let timeLeft = LIMIT_TIME;
        let timerInterval;
        let currentTarget = {};
        let isGameOver = false;
        let isGameStarted = false;

        const timerContainer = document.getElementById('timer-container');
        const timerBar = document.getElementById('timer-bar');
        const gameArea = document.getElementById('game-area');
        const wordEl = document.getElementById('word');
        const scoreEl = document.getElementById('score');
        const counterEl = document.getElementById('counter');
        const imgEl = document.getElementById('key-image');
        const resultScreen = document.getElementById('result-screen');

        function startGame() {
            isGameStarted = true;
            isGameOver = false;
            score = 0;
            questionCount = 0;
            timeLeft = LIMIT_TIME;
            scoreEl.textContent = `SCORE: 0`;

            document.getElementById('start-screen').style.display = 'none';
            gameArea.style.display = 'flex';
            timerContainer.style.display = 'block';

            startTimer();
            nextKey();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / LIMIT_TIME) * 100;
                timerBar.style.width = Math.max(0, percentage) + '%';

                if (timeLeft <= 0) {
                    finishGame("TIME UP...");
                }
            }, 100);
        }

        function nextKey() {
            if (questionCount >= TOTAL_QUESTIONS) {
                finishGame("GAME CLEAR!");
                return;
            }
            questionCount++;
            counterEl.textContent = `第 ${questionCount} / ${TOTAL_QUESTIONS} 問`;
            wordEl.classList.remove('flash-green', 'flash-red');
            void wordEl.offsetWidth;

            currentTarget = keyList[Math.floor(Math.random() * keyList.length)];
            wordEl.textContent = currentTarget.display;
            imgEl.style.display = 'block';
            imgEl.src = currentTarget.img;
        }

        function finishGame(status) {
            isGameOver = true;
            clearInterval(timerInterval);

            const resultStatusEl = document.getElementById('result-status');
            const resultImgEl = document.getElementById('result-image');
            const finalTimeEl = document.getElementById('final-time');

            resultStatusEl.textContent = status;
            document.getElementById('final-score').textContent = `最終スコア: ${score}`;

            if (status === "GAME CLEAR!") {
                // かかった時間を計算（制限時間 - 残り時間）
                const timeTaken = (LIMIT_TIME - timeLeft).toFixed(1);
                finalTimeEl.textContent = `クリアタイム: ${timeTaken} 秒`;
                finalTimeEl.style.display = 'block'; // クリア時は表示

                resultImgEl.src = "../img/clear.png";
                resultStatusEl.style.color = "#2ecc71";
            } else {
                // タイムアップ時はタイムを表示しない、または「時間切れ」と出す
                finalTimeEl.style.display = 'none';

                resultImgEl.src = "../img/timeup.png";
                resultStatusEl.style.color = "#e74c3c";
            }

            resultScreen.style.display = 'flex';
        }

        function resetGame(directStart) {
            resultScreen.style.display = 'none';
            gameArea.style.display = 'none';
            timerContainer.style.display = 'none';
            isGameStarted = false;

            if (directStart) {
                startGame();
            } else {
                document.getElementById('start-screen').style.display = 'flex';
            }
        }

        window.addEventListener('message', (e) => {
            if (!isGameStarted) {
                if (e.data.type === 'start') { startGame(); }
                return;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (!isGameStarted) {
                if (e.key === ' ') { e.preventDefault(); startGame(); }
                return;
            }
            if (isGameOver) return;

            e.preventDefault();
            if (e.key === currentTarget.key) {
                score++;
                scoreEl.textContent = `SCORE: ${score}`;
                wordEl.classList.add('flash-green');
                setTimeout(nextKey, 150);
            } else {
                timeLeft -= 2; // ペナルティ
                wordEl.classList.add('flash-red');
                setTimeout(() => wordEl.classList.remove('flash-red'), 200);
            }
        });
    </script>
</body>

</html>
